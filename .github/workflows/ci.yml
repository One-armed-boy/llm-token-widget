name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  node-verify:
    name: Node verification
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Verify
        run: make verify

      - name: Coverage thresholds
        run: make test-coverage

      - name: Build HTML preview
        run: make ui-preview

  macos-native-build:
    name: macOS native scaffold
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: macos
        run: xcodegen generate

      - name: Test Swift packages
        run: |
          swift test --package-path macos/Packages/UsageCore
          swift test --package-path macos/Packages/SnapshotStore
          swift test --package-path macos/Packages/ProviderAdapters

      - name: List schemes
        working-directory: macos
        run: xcodebuild -list -project LLMTokenWidget.xcodeproj

      - name: Build app and widget without signing
        working-directory: macos
        run: |
          xcodebuild \
            -project LLMTokenWidget.xcodeproj \
            -scheme LLMTokenWidgetApp \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build
